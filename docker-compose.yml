services:
  mysql:
    image: mysql:8.0
    container_name: limited-market-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT}:3306"

  redis:
    image: redis:7.0
    container_name: limited-market-redis
    ports:
      - "${REDIS_PORT}:6379"
